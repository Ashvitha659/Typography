<!DOCTYPE html>
<html>
    <head>
        <title>transformations</title>
        <style>
            div{
                width:300px;
                height:50px;
                background-color: aqua;
                border:1px solid black;
            }
            #mydiv {
                transform: rotateX(180deg);
            }
        </style>
    </head>
    <body>
<div>
    hi
</div>
<div id="mydiv">
    hi
</div>
    </body>
</html>
