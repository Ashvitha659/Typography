<!DOCTYPE html>
<html>
    <head>
        <title>Shadow</title>
        <style>
            *{
                text-align:center;
                font-family:'Courier New', Courier, monospace
            }
            #text{
                text-shadow: 2px 2px 1px orangered;
            }
            #box{
                box-shadow: 3px 3px 4px black;
            }
            #indent{
                text-indent: 50%;
            }
        </style>
    </head>
    <body>
        <h1 id="text"> we can all have fun</h1>
        <h1 id="box"> so can everybody else</h1>
        <div>
            <p>this is an example of a text indent</p>
            <p id="indent"> see, lookie</p>
        </div>
    </body>
</html>
